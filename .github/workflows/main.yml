name: Build, Push and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: shaigan54/sebps-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: shaigan54/sebps-frontend:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/SEBPS
            git pull origin main
            docker pull shaigan54/sebps-backend:latest
            docker pull shaigan54/sebps-frontend:latest

            # Extract the built React app from the frontend image onto the host.
            # The nginx service mounts /opt/sebps-frontend, so this is how it
            # gets the static files — frontend/dist is gitignored and never on disk.
            sudo mkdir -p /opt/sebps-frontend
            docker rm -f tmp_frontend 2>/dev/null || true
            docker create --name tmp_frontend shaigan54/sebps-frontend:latest
            sudo docker cp tmp_frontend:/usr/share/nginx/html/. /opt/sebps-frontend/
            docker rm tmp_frontend

            docker compose --profile production up -d --no-build db redis api celery_worker celery_beat nginx
