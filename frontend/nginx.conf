# ─────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name sebs.work.gd www.sebs.work.gd;

    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────────────────────
# HTTPS server
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name sebs.work.gd www.sebs.work.gd;

    # SSL certificates (mounted from EC2)
    ssl_certificate     /etc/ssl/sebps/fullchain.cer;
    ssl_certificate_key /etc/ssl/sebps/sebps.work.gd.key;

    # ── Static files (React SPA) ───────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Django backend ─────────────────────────────
    location /api/ {
        proxy_pass http://api:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 120s;
    }

    # ── WebSocket proxy → Django Channels ──────────────────────
    location /ws/ {
        proxy_pass http://api:8000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;

        proxy_read_timeout 3600s;
    }
}