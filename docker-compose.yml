# ─────────────────────────────────────────────────────────────────────────────
# SEBPS — Single-command stack
#
# Usage
# -----
#   1. cp .env.example .env
#   2. Set HOST_IP in .env to your machine's LAN IP:
#        macOS:  ipconfig getifaddr en0
#        Linux:  hostname -I | awk '{print $1}'
#   3. docker compose up --build
#
# After startup
# -------------
#   Web frontend  →  http://localhost:5173
#   Backend API   →  http://localhost:8000/api/v1/docs/
#   Mobile (Expo) →  scan the QR code printed in the 'mobile' service logs,
#                    or open Expo Go and enter http://<HOST_IP>:8081
#
# Backend-only dev (unchanged)
# ----------------------------
#   cd backend && docker compose up
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB:       sebps_db
      POSTGRES_USER:     sebps
      POSTGRES_PASSWORD: sebps_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U sebps -d sebps_db"]
      interval: 5s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5

  # ── Backend ─────────────────────────────────────────────────────────────────

  api:
    build: ./backend
    command: >-
      sh -c "python manage.py makemigrations accounts bills ocr predictions iot appliances budget recommendations chatbot notifications --no-input &&
             python manage.py migrate --no-input &&
             python manage.py load_appliance_catalog &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.base
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-prod
      - DATABASE_URL=postgres://sebps:sebps_pass@db:5432/sebps_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # HOST_IP comes from root .env — covers browser→Vite→API proxy origin
      # and direct mobile API calls (CORS applies to Expo web, not native)
      - ALLOWED_HOSTS=localhost,127.0.0.1,${HOST_IP:-localhost},api
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://${HOST_IP:-localhost}:5173,http://localhost:8081,http://${HOST_IP:-localhost}:8081
    env_file:
      - ./backend/.env          # GROQ_API_KEY, LESCO credentials, etc.
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./module_1_predictor:/module_1_predictor
      - ./module_2_ocr:/module_2_ocr
      - ./module_3_fetcher:/module_3_fetcher
      - ./module_4_recommender:/module_4_recommender
      - ./module_5_chatbot:/module_5_chatbot
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/docs/', timeout=8)\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout:  10s
      retries:  6
      start_period: 90s

  celery_worker:
    build: ./backend
    command: celery -A tasks.celery worker --loglevel=info --concurrency=4
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.base
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-prod
      - DATABASE_URL=postgres://sebps:sebps_pass@db:5432/sebps_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./module_1_predictor:/module_1_predictor
      - ./module_2_ocr:/module_2_ocr
      - ./module_3_fetcher:/module_3_fetcher
      - ./module_4_recommender:/module_4_recommender
      - ./module_5_chatbot:/module_5_chatbot
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  celery_beat:
    build: ./backend
    command: celery -A tasks.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.base
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-prod
      - DATABASE_URL=postgres://sebps:sebps_pass@db:5432/sebps_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Web Frontend ─────────────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    environment:
      # Vite proxy rewrites /api → http://api:8000 inside the Docker network.
      # The browser never calls the backend directly, so no CORS issue.
      - VITE_BACKEND_URL=http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules   # isolate container node_modules from host
    depends_on:
      api:
        condition: service_healthy

  # ── Mobile (Expo Metro bundler) ──────────────────────────────────────────────
  #
  # The Metro JS bundler runs in Docker; the Expo Go app on the phone connects
  # to HOST_IP:8081 on the host machine (Docker port mapping handles the rest).
  # HOST_IP must be your machine's LAN IP so the phone can reach it.

  mobile:
    build: ./mobile
    tty: true          # gives Expo a real TTY so the QR code renders in `docker logs`
    environment:
      # Tells Metro which IP to advertise in the QR code / connection URL
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP:-localhost}
      # Embedded into the JS bundle at Metro start time — used by api/client.js
      - EXPO_PUBLIC_API_URL=http://${HOST_IP:-localhost}:8000/api/v1
      - EXPO_PUBLIC_WS_URL=ws://${HOST_IP:-localhost}:8000
    ports:
      - "8081:8081"    # Metro JS bundler
      - "19000:19000"  # Expo DevTools / tunnel
      - "19001:19001"  # Expo DevTools alternate
    volumes:
      - ./mobile:/app
      - mobile_nm:/app/node_modules    # isolate container node_modules from host
    depends_on:
      api:
        condition: service_healthy

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  pgdata:
  redisdata:
  media_files:
  frontend_nm:
  mobile_nm:
